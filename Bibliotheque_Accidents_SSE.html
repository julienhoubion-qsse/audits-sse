<!-- SSE — Bibliothèque des faits accidentels -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#6BBF1F;--green-dk:#4D8A12;--green-lt:#D6F0A8;--green-xlt:#EEF8D8;
  --steel:#4A6880;--steel-dk:#2E4558;--steel-mid:#7A96AA;--steel-lt:#C8D8E4;--steel-xlt:#EAF1F6;
  --charcoal:#3A3A3A;--white:#FFFFFF;--slate:#F2F6F9;--muted:#6B7D8A;--border:#D0DDE8;
  --ok-bg:#D6F0A8;--ok-tc:#2D5A00;--warn-bg:#FFF0B3;--warn-tc:#7A5000;
  --bad-bg:#FFD6D6;--bad-tc:#8B0000;
  --radius:10px;--shadow:0 2px 14px rgba(46,69,88,.10)
}
body{font-family:'Nunito Sans',sans-serif;background:var(--slate);color:var(--charcoal);min-height:100vh;margin:0}
.page-header{background:linear-gradient(135deg,var(--steel-dk),var(--steel));padding:20px 28px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.page-header::after{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:#dc2626}
.ph-tag{font-family:'Exo 2',sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#fca5a5;margin-bottom:5px;position:relative;z-index:1}
.ph-title{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;color:#fff;position:relative;z-index:1}
.ph-sub{font-size:12px;color:var(--steel-lt);margin-top:3px;position:relative;z-index:1}
.nav-bar{background:var(--steel-dk);padding:0 28px;display:flex;gap:0;overflow-x:auto}
.nav-btn{background:none;border:none;border-bottom:3px solid transparent;padding:12px 18px;font-family:'Nunito Sans',sans-serif;font-size:13px;font-weight:600;color:var(--steel-lt);cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.nav-btn:hover{color:#fff;border-bottom-color:rgba(107,191,31,.5)}
.nav-btn.active{color:#fff!important;border-bottom-color:#6BBF1F!important}
.wrapper{max-width:1100px;margin:0 auto;padding:22px 24px 48px}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.filters{display:flex;gap:8px;flex-wrap:wrap;padding:12px 18px;background:var(--slate);border-bottom:1px solid var(--border)}
.fld-sel,.fld-inp{height:34px;border:1px solid var(--border);border-radius:7px;padding:0 10px;font-family:'Nunito Sans',sans-serif;font-size:12px;background:var(--white);color:var(--charcoal)}
.btn{height:34px;padding:0 16px;border:none;border-radius:7px;font-family:'Nunito Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--green);color:#fff}
.btn-ghost{background:var(--steel-xlt);color:var(--steel-dk);border:1px solid var(--border)}
.btn-danger{background:var(--bad-bg);color:var(--bad-tc);border:1px solid #fca5a5}
.btn-blue{background:#dbeafe;color:#1e3a8a;border:1px solid #93c5fd}
.btn-sm{height:28px;padding:0 10px;font-size:11px}
/* Stats */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stat-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 18px;flex:1;min-width:120px;text-align:center}
.stat-val{font-family:'Exo 2',sans-serif;font-size:26px;font-weight:800;color:var(--steel-dk)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
/* Tabs */
.site-tabs{display:flex;gap:0;overflow-x:auto;border-bottom:2px solid var(--border);margin-bottom:16px}
.site-tab{padding:9px 16px;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.site-tab:hover{color:var(--steel-dk)}
.site-tab.active{color:var(--green-dk);border-bottom-color:var(--green)}
/* Accident card */
.acc-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;border-left:4px solid #dc2626}
.acc-card.type-arret{border-left-color:#dc2626}
.acc-card.type-sans{border-left-color:#f97316}
.acc-card.type-trajet{border-left-color:#3b82f6}
.acc-card.type-soins{border-left-color:#8b5cf6}
.acc-hd{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.acc-site{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:800;color:var(--steel-dk);background:var(--steel-xlt);padding:4px 10px;border-radius:6px;flex-shrink:0}
.acc-info{display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex:1}
.acc-meta{font-size:12px;color:var(--muted)}
.acc-victime{font-size:13px;font-weight:600;color:var(--charcoal)}
.type-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;text-transform:uppercase;letter-spacing:.5px}
.badge-arret{background:#fee2e2;color:#dc2626}
.badge-sans{background:#ffedd5;color:#c2410c}
.badge-trajet{background:#dbeafe;color:#1d4ed8}
.badge-soins{background:#ede9fe;color:#7c3aed}
.acc-body{padding:14px 16px;border-top:1px solid var(--border);display:none}
.acc-body.open{display:block}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.detail-item{background:var(--slate);border-radius:7px;padding:10px 12px}
.detail-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px}
.detail-val{font-size:13px;color:var(--charcoal);font-weight:600}
.desc-box{background:var(--slate);border-radius:7px;padding:12px;font-size:13px;color:var(--charcoal);margin-bottom:12px;line-height:1.6}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-family:'Exo 2',sans-serif;font-size:16px;font-weight:700;color:var(--steel-dk);margin-bottom:6px}
</style>

<div class="page-header">
  <div>
    <div class="ph-tag">Service QSSE</div>
    <div class="ph-title">🚑 Bibliothèque des faits accidentels</div>
    <div class="ph-sub">Historique de tous les faits accidentels déclarés</div>
  </div>
  <div style="position:relative;z-index:1">
    <button class="btn btn-primary" onclick="window.location.href='Declaration_Accident_SSE.html'">➕ Nouvelle déclaration</button>
  </div>
</div>
<div class="nav-bar">
  <button class="nav-btn" onclick="window.location.href='Accueil_SSE.html'">🏠 Accueil</button>
  <button class="nav-btn" onclick="window.location.href='Declaration_Accident_SSE.html'">🚑 Déclaration</button>
  <button class="nav-btn" onclick="window.location.href='Plan_Actions_SSE.html'">📋 Plan d'actions</button>
  <button class="nav-btn active" onclick="window.location.href='Bibliotheque_Accidents_SSE.html'">📂 Bibliothèque accidents</button>
</div>

<div class="wrapper">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">Total déclarations</div></div>
    <div class="stat-card" style="border-top:3px solid #dc2626"><div class="stat-val" id="st-arret" style="color:#dc2626">—</div><div class="stat-lbl">Avec arrêt</div></div>
    <div class="stat-card" style="border-top:3px solid #f97316"><div class="stat-val" id="st-sans" style="color:#f97316">—</div><div class="stat-lbl">Sans arrêt</div></div>
    <div class="stat-card" style="border-top:3px solid #3b82f6"><div class="stat-val" id="st-trajet" style="color:#3b82f6">—</div><div class="stat-lbl">Trajet</div></div>
    <div class="stat-card" style="border-top:3px solid #8b5cf6"><div class="stat-val" id="st-soins" style="color:#8b5cf6">—</div><div class="stat-lbl">Soins infirmiers</div></div>
  </div>

  <div class="card">
    <div class="filters">
      <select class="fld-sel" id="f-site" onchange="render()">
        <option value="">Tous les sites</option>
        <option value="38">38</option><option value="41">41</option>
        <option value="89">89</option><option value="47">47</option>
        <option value="37">37</option><option value="17">17</option>
        <option value="72">72</option><option value="72bis">72bis</option>
      </select>
      <select class="fld-sel" id="f-type" onchange="render()">
        <option value="">Tous types</option>
        <option value="Accident avec arrêt">🏥 Avec arrêt</option>
        <option value="Accident sans arrêt">🩹 Sans arrêt</option>
        <option value="Accident de trajet">🚗 Trajet</option>
        <option value="Soins infirmiers">💊 Soins infirmiers</option>
      </select>
      <input class="fld-inp" id="f-search" placeholder="Rechercher victime, description..." oninput="render()" style="min-width:200px">
    </div>
    <div style="padding:16px" id="acc-list">
      <div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Chargement...</div></div>
    </div>
  </div>
</div>

<script>
const GSHEET_URL="https://script.google.com/macros/s/AKfycbxQenH3pxHDRm1pXvhoEQlWkQCV4lQJikI-ldcBS_wYuTTis2RCpYnIvpDS82b4wut4cg/exec";
let ACCIDENTS=[];

function jsonpGet(action){
  return new Promise((resolve,reject)=>{
    const cb='_cb'+Date.now()+Math.random().toString(36).slice(2);
    window[cb]=function(d){delete window[cb];const el=document.getElementById('_js_'+cb);if(el)el.remove();resolve(d);};
    const s=document.createElement('script');s.id='_js_'+cb;
    s.src=GSHEET_URL+'?action='+action+'&callback='+cb;
    s.onerror=()=>reject(new Error('failed'));
    document.head.appendChild(s);
  });
}

function typeBadge(type){
  if(type==='Accident avec arrêt') return '<span class="type-badge badge-arret">🏥 Avec arrêt</span>';
  if(type==='Accident sans arrêt') return '<span class="type-badge badge-sans">🩹 Sans arrêt</span>';
  if(type==='Accident de trajet')  return '<span class="type-badge badge-trajet">🚗 Trajet</span>';
  if(type==='Soins infirmiers')    return '<span class="type-badge badge-soins">💊 Soins</span>';
  return '<span class="type-badge" style="background:var(--steel-xlt);color:var(--muted)">'+type+'</span>';
}
function typeClass(type){
  if(type==='Accident avec arrêt') return 'type-arret';
  if(type==='Accident sans arrêt') return 'type-sans';
  if(type==='Accident de trajet')  return 'type-trajet';
  if(type==='Soins infirmiers')    return 'type-soins';
  return '';
}

function buildRelatedActions(accId){
  const related=ACTIONS_ALL.filter(a=>String(a.auditId)==='ACC-'+String(accId));
  if(!related.length)return'';
  const rows=related.map(a=>{
    const pct=a.avancement||0;
    let badge='';
    if(a.efficace==='oui')badge='<span style="background:#eef2ff;color:#4f46e5;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px">✅ Efficace</span>';
    else if(pct>=100)badge='<span style="background:var(--ok-bg);color:var(--ok-tc);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px">✔ Terminée</span>';
    else if(pct>0)badge='<span style="background:var(--warn-bg);color:var(--warn-tc);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px">⏳ En cours</span>';
    else badge='<span style="background:#f1f5f9;color:#64748b;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px">📌 À faire</span>';
    return'<div style="padding:8px 10px;border:1px solid var(--border);border-radius:7px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">'
      +'<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--charcoal)">'+(a.description||'—')+'</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:2px">👤 '+(a.responsable||'—')+' · '+pct+'%</div></div>'
      +badge+'</div>';
  }).join('');
  return '<div style="margin-top:12px"><div style="font-family:Arial,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#2E4558;margin-bottom:8px">📋 Actions en cours ('+related.length+')</div>'+rows+'</div>';
}
function render(){
  const site=document.getElementById('f-site').value;
  const type=document.getElementById('f-type').value;
  const search=document.getElementById('f-search').value.toLowerCase();

  let lib=ACCIDENTS.filter(a=>{
    if(site&&a.site!==site)return false;
    if(type&&a.type!==type)return false;
    if(search&&!(
      (a.victime||'').toLowerCase().includes(search)||
      (a.description||'').toLowerCase().includes(search)||
      (a.activite||'').toLowerCase().includes(search)
    ))return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  // Stats
  document.getElementById('st-total').textContent=ACCIDENTS.length;
  document.getElementById('st-arret').textContent=ACCIDENTS.filter(a=>a.type==='Accident avec arrêt').length;
  document.getElementById('st-sans').textContent=ACCIDENTS.filter(a=>a.type==='Accident sans arrêt').length;
  document.getElementById('st-trajet').textContent=ACCIDENTS.filter(a=>a.type==='Accident de trajet').length;
  document.getElementById('st-soins').textContent=ACCIDENTS.filter(a=>a.type==='Soins infirmiers').length;

  const el=document.getElementById('acc-list');
  if(!lib.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">'+(ACCIDENTS.length===0?'Aucune déclaration enregistrée':'Aucun résultat')+'</div><div style="font-size:12px;margin-top:4px">'+(ACCIDENTS.length===0?'Commencez par déclarer un fait accidentel.':'Modifiez vos filtres.')+'</div>'+(ACCIDENTS.length===0?'<br><br><button class="btn btn-primary" onclick="window.location.href=\'Declaration_Accident_SSE.html\'">🚑 Nouvelle déclaration</button>':'')+'</div>';
    return;
  }

  el.innerHTML=lib.map(a=>{
    const dateStr=a.date?new Date(a.date).toLocaleDateString('fr-FR'):'—';
    const tc=typeClass(a.type);
    const hasArret=(a.type==='Accident avec arrêt')&&(a.duree||a.finArret);
    return(
      '<div class="acc-card '+tc+'" id="ac-'+a.id+'">'
      +'<div class="acc-hd" data-id="'+a.id+'" onclick="tog(this.dataset.id)">'
      +'<div class="acc-site">Site '+a.site+'</div>'
      +'<div class="acc-info"><div>'
      +'<div class="acc-victime">&#128100; '+(a.victime||'&mdash;')+'</div>'
      +'<div class="acc-meta">&#128197; '+dateStr+' &middot; '+(a.activite||'&mdash;')+'</div>'
      +'</div>'+typeBadge(a.type)+'</div>'
      +'<span style="color:var(--border);font-size:18px">&rsaquo;</span>'
      +'</div>'
      +'<div class="acc-body" id="ab-'+a.id+'">'
      +'<div class="detail-grid">'
      +'<div class="detail-item"><div class="detail-lbl">Victime</div><div class="detail-val">'+(a.victime||'&mdash;')+'</div></div>'
      +'<div class="detail-item"><div class="detail-lbl">Si&egrave;ge des l&eacute;sions</div><div class="detail-val">'+(a.siege||'&mdash;')+'</div></div>'
      +'<div class="detail-item"><div class="detail-lbl">Date</div><div class="detail-val">'+dateStr+'</div></div>'
      +'<div class="detail-item"><div class="detail-lbl">Site</div><div class="detail-val">'+a.site+'</div></div>'
      +(hasArret?'<div class="detail-item"><div class="detail-lbl">Dur&eacute;e arr&ecirc;t</div><div class="detail-val">'+(a.duree?a.duree+' jour(s)':'&mdash;')+'</div></div><div class="detail-item"><div class="detail-lbl">Fin arr&ecirc;t</div><div class="detail-val">'+(a.finArret?new Date(a.finArret).toLocaleDateString('fr-FR'):'&mdash;')+'</div></div>':'')
      +'</div>'
      +'<div class="detail-lbl" style="margin-bottom:6px">Activit&eacute; au moment du fait</div>'
      +'<div class="desc-box" style="margin-bottom:10px">'+(a.activite||'&mdash;')+'</div>'
      +'<div class="detail-lbl" style="margin-bottom:6px">Description des circonstances</div>'
      +'<div class="desc-box">'+(a.description||'&mdash;')+'</div>'
      +(a.causes?'<div class="detail-lbl" style="margin-bottom:6px;margin-top:8px">&#128269; Analyse des causes profondes</div><div class="desc-box" style="background:#faf5ff;border:1px solid #e9d5ff">'+a.causes+'</div>':'')
      +(a.lien?'<div style="background:#fef3c7;border-radius:7px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:18px">&#128206;</span><div style="flex:1"><div style="font-size:11px;font-weight:700;color:#d97706;margin-bottom:2px">Document joint</div><a href="'+a.lien+'" target="_blank" style="font-size:12px;color:#2E4558;word-break:break-all">Ouvrir le document &rarr;</a></div></div>':'')
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">'
      +'<button class="btn btn-primary btn-sm" data-id="'+a.id+'" data-site="'+a.site+'" data-date="'+a.date+'" data-type="'+(a.type||'').replace(/"/g,'')+'" data-victime="'+(a.victime||'').replace(/"/g,'')+'" onclick="createActionFromAccBtn(this)">&#10133; Cr&eacute;er une action</button>'
      +'<button class="btn btn-danger btn-sm" onclick="delAcc(''+a.id+'')">&#128465; Supprimer</button>'
      +'</div>'
      +'</div>'
      +'</div>'
    );
}).join('');
}

function tog(id){
  const b=document.getElementById('ab-'+id);
  if(b)b.classList.toggle('open');
}

function createActionFromAccBtn(btn){
  createActionFromAcc(btn.dataset.id,btn.dataset.site,btn.dataset.date,btn.dataset.type,btn.dataset.victime);
}
function createActionFromAcc(id,site,date,type,victime){
  const origin=encodeURIComponent('🚑 Fait accidentel — '+type+' — Site '+site+' — '+date+' — '+victime);
  window.location.href='Plan_Actions_SSE.html?auditId=ACC-'+id+'&site='+site+'&auditDate='+date+'&sectionKey=accident&criteriaIdx=0&origin='+origin;
}

async function delAcc(id){
  if(!confirm('Supprimer cette déclaration ?'))return;
  try{
    await fetch(GSHEET_URL,{method:'POST',body:JSON.stringify({action:'deleteAccident',id})});
    ACCIDENTS=ACCIDENTS.filter(a=>String(a.id)!==String(id));
    render();
  }catch(e){alert('Erreur: '+e.message);}
}

let ACTIONS_ALL=[];

async function init(){
  try{
    // Charger aussi les actions
    const actD=await jsonpGet('getActions');
    ACTIONS_ALL=(actD.data||[]).map(row=>({
      id:row[0],auditId:row[1],site:row[2],
      origin:row[6],description:row[7],
      responsable:row[8],delai:row[9],
      avancement:Number(row[10]||0),efficace:row[12]
    }));
  }catch(e){console.warn('Actions load error',e);}
  try{
    const d=await jsonpGet('getAccidents');
    ACCIDENTS=(d.data||[]).map(row=>({
      id:row[0],
      date:String(row[1]||'').split('T')[0],
      site:String(row[2]),
      victime:row[3],siege:row[4],type:row[5],
      activite:row[6],description:row[7],
      causes:row[8],lien:row[9],
      duree:row[10],finArret:String(row[11]||'').split('T')[0],
      createdAt:row[12]
    }));
    render();
  }catch(e){
    console.warn(e);
    document.getElementById('acc-list').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Erreur de chargement</div></div>';
  }
}
init();
</script>
