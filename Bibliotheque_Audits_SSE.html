<script>
const SP_CONFIG={GSHEET_URL:"https://script.google.com/macros/s/AKfycbxQenH3pxHDRm1pXvhoEQlWkQCV4lQJikI-ldcBS_wYuTTis2RCpYnIvpDS82b4wut4cg/exec",MODE:"googlesheets"};
const SP={
  async getAll(){
    return new Promise((resolve,reject)=>{
      const cb='_cb'+Date.now();
      window[cb]=function(d){
        delete window[cb];
        document.getElementById('_jsonp_script')&&document.getElementById('_jsonp_script').remove();
        const data=(d.data||[]).map(row=>{
          let dateStr=String(row[3]||'');
          if(dateStr.includes('T'))dateStr=dateStr.split('T')[0];
          let scores={};try{scores=JSON.parse(row[4]||'{}');}catch(e){}
          let comments={};try{comments=JSON.parse(row[7]||'{}');}catch(e){}
          return {id:row[0],site:String(row[1]),auditeur:row[2],date:dateStr,scores:scores,total:row[5],savedAt:row[6],comments:comments};
        });
        resolve(data);
      };
      const s=document.createElement('script');
      s.id='_jsonp_script';
      s.src=SP_CONFIG.GSHEET_URL+'?action=getAll&callback='+cb;
      s.onerror=()=>reject(new Error('JSONP failed'));
      document.head.appendChild(s);
    });
  },
  async create(record){
    const resp=await fetch(SP_CONFIG.GSHEET_URL,{
      method:"POST",
      body:JSON.stringify({action:"create",data:record})
    });
    const txt=await resp.text();
    if(txt!=="ok")throw new Error("GSheets error: "+txt);
    return true;
  },
  async delete(id){
    await fetch(SP_CONFIG.GSHEET_URL,{
      method:"POST",
      body:JSON.stringify({action:"delete",id:id})
    });
  }
};
const STORAGE={
  async getAll(){
    try{return await SP.getAll();}catch(e){console.warn("GSheets error, local fallback:",e);return JSON.parse(localStorage.getItem("sse_audits")||"[]");}
  },
  async save(record){
    try{await SP.create(record);return true;}catch(e){console.warn("GSheets save error:",e);const lib=JSON.parse(localStorage.getItem("sse_audits")||"[]");lib.push({...record,id:Date.now()});localStorage.setItem("sse_audits",JSON.stringify(lib));return false;}
  },
  async delete(id){
    try{await SP.delete(id);}catch(e){const lib=JSON.parse(localStorage.getItem("sse_audits")||"[]").filter(a=>a.id!==id);localStorage.setItem("sse_audits",JSON.stringify(lib));}
  }
};
</script>

const SITES=["38", "41", "89", "47", "37", "17", "72", "72bis"];
let AUDITS=[],curSite='all';

function avg(obj){const v=Object.values(obj).filter(x=>x!==null&&x!=='');return v.length?Math.round(v.reduce((a,b)=>a+Number(b),0)/v.length):null;}
function sc(v){return v===null?'empty':v>=80?'ok':v>=50?'warn':'bad';}
function hc(v){return v===null||v===''?'':v>=80?'ok':v>=50?'warn':'bad';}

function fSite(site,el){
  curSite=site;
  document.querySelectorAll('.site-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('fs').value=site==='all'?'':site;
  render();
}
function fSiteSelect(){
  const val=document.getElementById('fs').value;
  curSite=val||'all';
  document.querySelectorAll('.site-tab').forEach(t=>{t.classList.remove('active');if(t.dataset.site===(val||'all'))t.classList.add('active');});
  render();
}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const sf=document.getElementById('fs').value||curSite;
  const stf=document.getElementById('fst').value;
  const srt=document.getElementById('sort').value;

  let lib=[...AUDITS];
  if(sf&&sf!=='all')lib=lib.filter(a=>a.site===sf);
  if(q)lib=lib.filter(a=>(`${a.site} ${a.auditeur} ${a.date} ${a.type}`).toLowerCase().includes(q));
  if(stf)lib=lib.filter(a=>{const s=avg(a.scores);if(stf==='ok')return s!==null&&s>=80;if(stf==='warn')return s!==null&&s>=50&&s<80;if(stf==='bad')return s!==null&&s<50;return true;});
  lib.sort((a,b)=>{switch(srt){case'date-desc':return b.date.localeCompare(a.date);case'date-asc':return a.date.localeCompare(b.date);case'score-desc':return(avg(b.scores)||0)-(avg(a.scores)||0);case'score-asc':return(avg(a.scores)||0)-(avg(b.scores)||0);case'site-asc':return a.site.localeCompare(b.site);default:return 0;}  });

  // Stats
  const allSc=AUDITS.map(a=>avg(a.scores)).filter(v=>v!==null);
  document.getElementById('st-total').textContent=AUDITS.length;
  document.getElementById('st-sites').textContent=new Set(AUDITS.map(a=>a.site)).size;
  document.getElementById('st-score').textContent=allSc.length?Math.round(allSc.reduce((a,b)=>a+b,0)/allSc.length)+'%':'—';
  document.getElementById('st-crit').textContent=allSc.filter(s=>s<50).length;

  const el=document.getElementById('audit-list');
  if(!lib.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">'+(AUDITS.length===0?'Aucun audit enregistré':'Aucun résultat')+'</div><div style="font-size:12px;margin-top:5px">'+(AUDITS.length===0?'Commencez par saisir un premier audit.':'Modifiez vos filtres.')+'</div>'+(AUDITS.length===0?'<br><button class="btn btn-primary" onclick="window.location.href=\'Formulaire_Audit_SSE.html\'">📝 Saisir un audit</button>':'')+'</div>';
    return;
  }

  el.innerHTML=lib.map(a=>{
    const s=avg(a.scores),cls=sc(s),sid='ad-'+a.id;
    const sectHtml=SECTIONS.map(t=>{const v=a.scores[t.key];const c=hc(v);return`<div class="score-item ${c}"><div class="score-icon">${t.icon}</div><div class="score-lbl">${t.label}</div><div class="score-val">${v!==null?v+'%':'—'}</div></div>`;}).join('');
    let ncHtml='';
    if(a.comments)SECTIONS.forEach(sec=>{if(!a.comments[sec.key])return;a.comments[sec.key].forEach((item,ci)=>{if(item.status==='NC'){
        ncHtml+='<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">'
          +'<div style="flex:1;font-size:11px"><span style="font-weight:700;color:var(--bad-tc)">NC</span> · '+sec.icon+' '+sec.label+' · Critère '+(ci+1)+' — '+sec.criteria[ci]+(item.comment?'<div style="color:var(--muted);font-size:10px">💬 '+item.comment+'</div>':'')+'</div>'
          +'<button class="btn btn-primary" style="font-size:10px;height:26px;padding:0 8px;white-space:nowrap" data-aid="'+a.id+'" data-site="'+a.site+'" data-date="'+a.date+'" data-sk="'+sec.key+'" data-ci="'+ci+'" onclick="createActionBtn(this)">➕ Action</button>'
          +'</div>';
      }});});
    return`<div class="audit-card">
      <div class="audit-hd" onclick="togCard('${sid}')">
        <div class="audit-meta">
          <div class="audit-site">${a.site}</div>
          <div class="audit-info">📅 ${new Date(a.date).toLocaleDateString('fr-FR')}</div>
          <div class="audit-info">👤 ${a.auditeur}</div>
          <div class="audit-type">${a.type||'Interne'}</div>
          ${a.perimetre?'`<div class="audit-info">📍 '+(a.perimetre)+'</div>`':''}
        </div>
        <div class="audit-score ${cls}">${s!==null?s+'%':'—'}</div>
      </div>
      <div class="audit-body" id="${sid}">
        <div class="scores-grid">${sectHtml}</div>
        ${ncHtml?'<div style="margin:8px 0 5px"><div style="font-size:11px;font-weight:700;color:var(--bad-tc);margin-bottom:5px">&#128680; Non-conformités</div>'+ncHtml+'</div>':'<div style="font-size:12px;color:var(--ok-tc);margin-bottom:8px">&#9989; Aucune non-conformité enregistrée</div>'}
        <div class="audit-acts">
          <button class="btn btn-blue" style="font-size:11px;padding:5px 10px" onclick="editAudit(${a.id})">✏️ Modifier</button>
          <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="expSingle(${a.id})">📥 CSV</button>
          <button class="btn btn-danger" style="font-size:11px;padding:5px 10px" onclick="delAudit(${a.id})">🗑️ Supprimer</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function togCard(id){document.getElementById(id).classList.toggle('open');}

async function delAudit(id){
  if(!confirm('Supprimer cet audit définitivement ?'))return;
  await STORAGE.delete(id);
  AUDITS=AUDITS.filter(a=>a.id!==id);render();
}

function buildCSV(recs){
  let csv='Site;Date;Auditeur;Responsable;Type;Périmètre';
  SECTIONS.forEach(s=>csv+=`;${s.icon} ${s.label}`);csv+=';Score Global\n';
  recs.forEach(a=>{
    let row=`"${a.site}";"${a.date}";"${a.auditeur||''}";"${a.responsable||''}";"${a.type||''}";"${a.perimetre||''}"`;
    SECTIONS.forEach(s=>row+=`;${a.scores[s.key]!==null?a.scores[s.key]+'%':''}`);
    const sc=avg(a.scores);row+=`;${sc!==null?sc+'%':''}`;csv+=row+'\n';
  });return csv;
}
function expSingle(id){const a=AUDITS.find(x=>x.id===id);if(!a)return;dl(buildCSV([a]),`Audit_${a.site}_${a.date}.csv`);}
function exportAll(){if(!AUDITS.length){alert('Aucun audit.');return;}dl(buildCSV(AUDITS),'Bibliotheque_Audits_SSE.csv');}
function dl(csv,name){const b=new Blob([csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();}

function editAudit(id){
  window.location.href='Formulaire_Audit_SSE.html?edit='+id;
}
function createActionBtn(btn){
  const auditId=btn.dataset.aid, site=btn.dataset.site, auditDate=btn.dataset.date;
  const sectionKey=btn.dataset.sk, criteriaIdx=Number(btn.dataset.ci);
  const sec=SECTIONS.find(s=>s.key===sectionKey)||{label:sectionKey,icon:'',criteria:[]};
  const origin=sec.icon+' '+sec.label+(sec.criteria[criteriaIdx]?' — Critère '+(criteriaIdx+1)+' : '+sec.criteria[criteriaIdx]:'');
  const params=new URLSearchParams({auditId,site,auditDate,sectionKey,criteriaIdx,origin:encodeURIComponent(origin)});
  window.location.href='Plan_Actions_SSE.html?'+params.toString();
}
function createAction(auditId,site,auditDate,sectionKey,criteriaIdx,origin){
  const params=new URLSearchParams({auditId,site,auditDate,sectionKey,criteriaIdx,origin:encodeURIComponent(origin||'')});
  window.location.href='Plan_Actions_SSE.html?'+params.toString();
}
async function init(){
  try{AUDITS=await STORAGE.getAll();}catch(e){AUDITS=[];}
  render();
}
init();

<script>
function notifyHeight(){
  var h=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight);
  window.parent.postMessage({type:'resize',height:h+60},'*');
}
window.addEventListener('load',function(){
  notifyHeight();
  if(window.ResizeObserver){new ResizeObserver(notifyHeight).observe(document.body);}
  else{setInterval(notifyHeight,800);}
});
</script>
