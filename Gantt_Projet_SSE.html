<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#6BBF1F;--green-dk:#4D8A12;--green-lt:#D6F0A8;
  --steel:#4A6880;--steel-dk:#2E4558;--steel-lt:#C8D8E4;--steel-xlt:#EAF1F6;
  --charcoal:#3A3A3A;--white:#FFFFFF;--slate:#F2F6F9;--muted:#6B7D8A;--border:#D0DDE8;
  --blue:#1d4ed8;--blue-lt:#dbeafe;--blue-xlt:#eff6ff;
  --radius:10px;--shadow:0 2px 14px rgba(46,69,88,.10)
}
body{font-family:'Nunito Sans',sans-serif;background:var(--slate);color:var(--charcoal);min-height:100vh;margin:0}
.page-header{background:linear-gradient(135deg,var(--steel-dk),var(--steel));padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.page-header::after{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--blue)}
.ph-tag{font-family:'Exo 2',sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#93c5fd;margin-bottom:3px;position:relative;z-index:1}
.ph-title{font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;color:#fff;position:relative;z-index:1}
.nav-bar{background:var(--steel-dk);padding:0 28px;display:flex;gap:0;overflow-x:auto}
.nav-btn{background:none;border:none;border-bottom:3px solid transparent;padding:12px 18px;font-family:'Nunito Sans',sans-serif;font-size:13px;font-weight:600;color:var(--steel-lt);cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.nav-btn:hover{color:#fff;border-bottom-color:rgba(107,191,31,.5)}
.nav-btn.active{color:#fff!important;border-bottom-color:#6BBF1F!important}
.wrapper{max-width:100%;padding:16px 24px 48px}
/* Toolbar */
.toolbar{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.zoom-btns{display:flex;gap:4px}
.zoom-btn{height:30px;padding:0 12px;border:1px solid var(--border);border-radius:7px;background:var(--white);font-size:12px;font-weight:600;cursor:pointer;color:var(--steel-dk);transition:all .15s}
.zoom-btn:hover,.zoom-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn{height:32px;padding:0 14px;border:none;border-radius:7px;font-family:'Nunito Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-ghost{background:var(--steel-xlt);color:var(--steel-dk);border:1px solid var(--border)}
.btn-green{background:var(--green-lt);color:var(--green-dk);border:1px solid var(--green)}
/* Gantt layout */
.gantt-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.gantt-container{display:flex;min-height:200px}
.gantt-left{width:320px;flex-shrink:0;border-right:2px solid var(--border)}
.gantt-right{flex:1;overflow-x:auto}
/* Left panel */
.gantt-lhd{height:50px;background:var(--steel-dk);display:flex;align-items:center;padding:0 14px;position:sticky;top:0;z-index:10}
.gantt-lhd-title{font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;color:#fff}
.gantt-row{height:40px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);gap:8px}
.gantt-row:hover{background:var(--slate)}
.gantt-row-label{font-size:12px;font-weight:600;color:var(--charcoal);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-row-sub{font-size:10px;color:var(--muted)}
.task-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.gantt-row:hover .task-actions{opacity:1}
.task-btn{width:22px;height:22px;border:none;border-radius:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.task-btn-edit{background:var(--blue-lt);color:var(--blue)}
.task-btn-del{background:#fee2e2;color:#dc2626}
/* Right panel (timeline) */
.gantt-rhd{height:50px;background:var(--steel-dk);position:sticky;top:0;z-index:10;min-width:100%}
.gantt-rhd-inner{display:flex;height:100%}
.col-header{display:flex;align-items:center;justify-content:center;font-family:'Exo 2',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.7);border-right:1px solid rgba(255,255,255,.1);white-space:nowrap;padding:0 2px}
.col-header.today{color:#6BBF1F;background:rgba(107,191,31,.15)}
.gantt-body{min-width:100%;position:relative}
.gantt-bar-row{height:40px;border-bottom:1px solid var(--border);position:relative;display:flex;align-items:center}
.gantt-bar-row.alt{background:var(--slate)}
.gantt-bar-row .today-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(107,191,31,.5);z-index:2;pointer-events:none}
.gantt-bar{position:absolute;height:22px;border-radius:4px;cursor:pointer;display:flex;align-items:center;padding:0 6px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;transition:filter .15s;z-index:1}
.gantt-bar:hover{filter:brightness(1.1)}
.gantt-bar-action{background:var(--blue)}
.gantt-bar-task{background:#8b5cf6}
.gantt-bar-milestone{background:#d97706;border-radius:50%;width:20px;height:20px;padding:0;justify-content:center}
/* Today marker */
.col-header-wrap{display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.col-subheader{display:flex;height:50%;align-items:center}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--white);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Exo 2',sans-serif;font-size:15px;font-weight:700;color:var(--steel-dk)}
.modal-body{padding:16px 18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.fld{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fld-lbl{font-size:11px;font-weight:700;color:var(--steel-dk);text-transform:uppercase;letter-spacing:.5px}
.fld-inp,.fld-sel{height:36px;border:1px solid var(--border);border-radius:7px;padding:0 10px;font-family:'Nunito Sans',sans-serif;font-size:13px;background:var(--white)}
.fld-txt{border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-family:'Nunito Sans',sans-serif;font-size:13px;resize:vertical;min-height:60px;width:100%}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--steel-dk);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>

<script>
const GSHEET_URL="https://script.google.com/macros/s/AKfycbxQenH3pxHDRm1pXvhoEQlWkQCV4lQJikI-ldcBS_wYuTTis2RCpYnIvpDS82b4wut4cg/exec";
var projetId=new URLSearchParams(window.location.search).get('projet');
var currentZoom='quarter';
var projet=null;
var actions=[];
var tasks=[];// tâches indépendantes stockées localement + GSheets
var ganttStart=null;
var ganttEnd=null;
var COL_W={week:20,month:40,quarter:80,semester:120,year:200};// px per unit

function goBack(){
  window.location.href='Bibliotheque_Projets_SSE.html';
}

function jsonpGet(action){
  return new Promise(function(resolve,reject){
    var cb='_cb'+Date.now()+Math.random().toString(36).slice(2);
    window[cb]=function(d){delete window[cb];var el=document.getElementById('_js_'+cb);if(el)el.remove();resolve(d);};
    var s=document.createElement('script');s.id='_js_'+cb;
    s.src=GSHEET_URL+'?action='+action+'&callback='+cb;
    s.onerror=function(){reject(new Error('failed'));};
    document.head.appendChild(s);
  });
}

function setZoom(z){
  currentZoom=z;
  document.querySelectorAll('.zoom-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.zoom===z);
  });
  renderGantt();
}

function scrollToToday(){
  var scroll=document.getElementById('gantt-scroll');
  var today=new Date();
  var diffDays=Math.floor((today-ganttStart)/(86400000));
  var pxPerDay=getPxPerDay();
  scroll.scrollLeft=Math.max(0,diffDays*pxPerDay-200);
}

function getPxPerDay(){
  if(currentZoom==='week')return 20/7;
  if(currentZoom==='month')return 40/30;
  if(currentZoom==='quarter')return 80/90;
  if(currentZoom==='semester')return 120/180;
  return 200/365;
}

function getColumns(){
  var cols=[];
  var d=new Date(ganttStart);
  var end=new Date(ganttEnd);
  var today=new Date();today.setHours(0,0,0,0);

  if(currentZoom==='week'){
    // Each column = 1 week
    d.setDate(d.getDate()-(d.getDay()||7)+1);// Monday
    while(d<=end){
      var isT=d<=today&&today<new Date(d.getTime()+7*86400000);
      cols.push({label:'S'+getWeekNum(d)+'\n'+d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}),start:new Date(d),width:COL_W.week,today:isT});
      d.setDate(d.getDate()+7);
    }
  } else if(currentZoom==='month'){
    d=new Date(ganttStart.getFullYear(),ganttStart.getMonth(),1);
    while(d<=end){
      var daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
      var w=Math.max(30,daysInMonth*getPxPerDay());
      var isT=d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth();
      cols.push({label:d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}),start:new Date(d),width:w,today:isT});
      d=new Date(d.getFullYear(),d.getMonth()+1,1);
    }
  } else if(currentZoom==='quarter'){
    d=new Date(ganttStart.getFullYear(),Math.floor(ganttStart.getMonth()/3)*3,1);
    while(d<=end){
      var q=Math.floor(d.getMonth()/3)+1;
      var qEnd=new Date(d.getFullYear(),d.getMonth()+3,0);
      var days=(qEnd-d)/86400000+1;
      var isT=d.getFullYear()===today.getFullYear()&&Math.floor(d.getMonth()/3)===Math.floor(today.getMonth()/3);
      cols.push({label:'T'+q+' '+d.getFullYear(),start:new Date(d),width:Math.max(60,days*getPxPerDay()),today:isT});
      d=new Date(d.getFullYear(),d.getMonth()+3,1);
    }
  } else if(currentZoom==='semester'){
    d=new Date(ganttStart.getFullYear(),Math.floor(ganttStart.getMonth()/6)*6,1);
    while(d<=end){
      var s=Math.floor(d.getMonth()/6)+1;
      var sEnd=new Date(d.getFullYear(),d.getMonth()+6,0);
      var days=(sEnd-d)/86400000+1;
      var isT=d.getFullYear()===today.getFullYear()&&Math.floor(d.getMonth()/6)===Math.floor(today.getMonth()/6);
      cols.push({label:'S'+s+' '+d.getFullYear(),start:new Date(d),width:Math.max(100,days*getPxPerDay()),today:isT});
      d=new Date(d.getFullYear(),d.getMonth()+6,1);
    }
  } else {
    // Year
    d=new Date(ganttStart.getFullYear(),0,1);
    while(d<=end){
      var isT=d.getFullYear()===today.getFullYear();
      cols.push({label:String(d.getFullYear()),start:new Date(d),width:COL_W.year,today:isT});
      d=new Date(d.getFullYear()+1,0,1);
    }
  }
  return cols;
}

function getWeekNum(d){
  var date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  date.setUTCDate(date.getUTCDate()+4-(date.getUTCDay()||7));
  var yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

function getX(date){
  var diff=(new Date(date)-ganttStart)/86400000;
  return diff*getPxPerDay();
}

function getW(start,end){
  var diff=(new Date(end)-new Date(start))/86400000+1;
  return Math.max(4,diff*getPxPerDay());
}

function renderGantt(){
  if(!ganttStart||!ganttEnd)return;
  var cols=getColumns();
  var totalW=cols.reduce(function(acc,c){return acc+c.width;},0);
  var allItems=getAllItems();
  var today=new Date();today.setHours(0,0,0,0);
  var todayX=getX(today);

  // Header
  var hdHtml='<div class="gantt-rhd-inner" style="width:'+totalW+'px">';
  cols.forEach(function(c){
    hdHtml+='<div class="col-header'+(c.today?' today':'')+'" style="width:'+c.width+'px;flex-shrink:0">'+c.label.replace('\n','<br>')+'</div>';
  });
  hdHtml+='</div>';
  document.getElementById('gantt-header').innerHTML=hdHtml;

  // Labels + bars
  var labelsHtml='';
  var barsHtml='<div style="width:'+totalW+'px;position:relative">';
  // Today line
  barsHtml+='<div class="today-line" style="left:'+todayX+'px;position:absolute;top:0;bottom:0;width:2px;background:rgba(107,191,31,.5);z-index:2;pointer-events:none"></div>';

  allItems.forEach(function(item,idx){
    var isAlt=idx%2===1;
    // Label
    labelsHtml+='<div class="gantt-row">';
    labelsHtml+='<div>';
    labelsHtml+='<div class="gantt-row-label" title="'+item.label+'">'+item.label+'</div>';
    if(item.phase||item.livrable)labelsHtml+='<div class="gantt-row-sub">'+(item.phase?item.phase:'')+(item.phase&&item.livrable?' · ':item.livrable?'':'')+(item.livrable?item.livrable:'')+'</div>';
    labelsHtml+='</div>';
    labelsHtml+='<div class="task-actions">';
    if(item.type==='task'){
      labelsHtml+='<button class="task-btn task-btn-edit" data-id="'+item.id+'" onclick="editTask(this.dataset.id)" title="Modifier">✏</button>';
      labelsHtml+='<button class="task-btn task-btn-del" data-id="'+item.id+'" onclick="delTask(this.dataset.id)" title="Supprimer">✕</button>';
    }
    labelsHtml+='</div>';
    labelsHtml+='</div>';

    // Bar
    var x=getX(item.start);
    var w=getW(item.start,item.end);
    var barClass=item.type==='action'?'gantt-bar-action':'gantt-bar-task';
    var color=item.color||(item.type==='action'?'#1d4ed8':'#8b5cf6');
    var pct=item.avancement||0;
    barsHtml+='<div class="gantt-bar-row'+(isAlt?' alt':'')+'" style="width:'+totalW+'px">';
    // Background fill for progress
    var progressW=Math.max(2,w*pct/100);
    barsHtml+='<div class="gantt-bar" style="left:'+x+'px;width:'+w+'px;background:'+color+';opacity:0.85" title="'+item.label+' ('+pct+'%)">';
    if(pct>0)barsHtml+='<div style="position:absolute;left:0;top:0;bottom:0;width:'+Math.min(100,pct)+'%;background:rgba(255,255,255,.25);border-radius:4px"></div>';
    if(w>30)barsHtml+='<span style="position:relative;z-index:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:'+(w-12)+'px">'+item.label+'</span>';
    barsHtml+='</div>';
    barsHtml+='</div>';
  });

  barsHtml+='</div>';
  document.getElementById('gantt-labels').innerHTML=labelsHtml;
  document.getElementById('gantt-bars').innerHTML=barsHtml;
  document.getElementById('gantt-info').textContent=allItems.length+' tâche(s) · Zoom '+currentZoom;
}

function getAllItems(){
  var items=[];
  // Actions liées au projet
  actions.forEach(function(a){
    if(!a.dateDebut||!a.delai)return;
    items.push({
      id:a.id,type:'action',
      label:a.description||(a.origin||'Action'),
      phase:a.phase||'',livrable:a.livrable||'',
      start:a.dateDebut,end:a.delai,
      avancement:Number(a.avancement||0),
      color:'#1d4ed8'
    });
  });
  // Tâches indépendantes
  tasks.forEach(function(t){
    items.push({
      id:t.id,type:'task',
      label:t.nom,phase:t.phase||'',livrable:t.livrable||'',
      start:t.debut,end:t.fin,
      avancement:Number(t.av||0),
      color:t.color||'#8b5cf6'
    });
  });
  // Sort by start date
  items.sort(function(a,b){return new Date(a.start)-new Date(b.start);});
  return items;
}

// Modal
function openAddTaskModal(task){
  document.getElementById('modal-title').textContent=task?'Modifier la tâche':'Nouvelle tâche indépendante';
  document.getElementById('m-task-id').value=task?task.id:'';
  document.getElementById('m-nom').value=task?task.nom:'';
  document.getElementById('m-phase').value=task?task.phase:'';
  document.getElementById('m-livrable').value=task?task.livrable:'';
  document.getElementById('m-debut').value=task?task.debut:'';
  document.getElementById('m-fin').value=task?task.fin:'';
  document.getElementById('m-resp').value=task?task.resp:'';
  document.getElementById('m-av').value=task?(task.av||0):0;
  document.getElementById('m-color').value=task?task.color:'#1d4ed8';
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}
function closeModalOutside(e){if(e.target===document.getElementById('modal'))closeModal();}

function editTask(id){
  var t=tasks.find(function(t){return String(t.id)===String(id);});
  if(t)openAddTaskModal(t);
}

async function saveTask(){
  var nom=document.getElementById('m-nom').value.trim();
  var debut=document.getElementById('m-debut').value;
  var fin=document.getElementById('m-fin').value;
  if(!nom||!debut||!fin){showToast('Nom et dates sont obligatoires',false);return;}
  var existId=document.getElementById('m-task-id').value;
  var task={
    id:existId||Date.now(),
    projetId:projetId,
    nom,
    phase:document.getElementById('m-phase').value.trim(),
    livrable:document.getElementById('m-livrable').value.trim(),
    debut,fin,
    resp:document.getElementById('m-resp').value.trim(),
    av:Number(document.getElementById('m-av').value)||0,
    color:document.getElementById('m-color').value
  };
  try{
    await fetch(GSHEET_URL,{method:'POST',body:JSON.stringify({action:'saveGanttTask',data:task})});
    if(existId){
      tasks=tasks.map(function(t){return String(t.id)===String(existId)?task:t;});
    } else {
      tasks.push(task);
    }
    closeModal();
    renderGantt();
    showToast('Tâche enregistrée !',true);
  }catch(e){showToast('Erreur: '+e.message,false);}
}

async function delTask(id){
  if(!confirm('Supprimer cette tâche ?'))return;
  try{
    await fetch(GSHEET_URL,{method:'POST',body:JSON.stringify({action:'deleteGanttTask',id})});
    tasks=tasks.filter(function(t){return String(t.id)!==String(id);});
    renderGantt();
    showToast('Tâche supprimée',true);
  }catch(e){showToast('Erreur: '+e.message,false);}
}

function showToast(msg,ok){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.background=ok?'var(--green-dk)':'var(--steel-dk)';
  t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);
}

async function init(){
  if(!projetId){document.getElementById('gantt-project-name').textContent='Aucun projet sélectionné';return;}

  var results=await Promise.allSettled([
    jsonpGet('getProjets'),
    jsonpGet('getActions'),
    jsonpGet('getGanttTasks')
  ]);

  // Get project info
  if(results[0].status==='fulfilled'){
    var p=(results[0].value.data||[]).find(function(r){return String(r[0])===String(projetId);});
    if(p){
      projet={id:p[0],nom:p[1],dateDebut:String(p[5]||'').split('T')[0],dateFin:String(p[6]||'').split('T')[0]};
      document.getElementById('gantt-project-name').textContent='📊 Gantt — '+projet.nom;
      document.getElementById('gantt-dates').textContent=new Date(projet.dateDebut).toLocaleDateString('fr-FR')+' → '+new Date(projet.dateFin).toLocaleDateString('fr-FR');
      ganttStart=new Date(projet.dateDebut);
      ganttEnd=new Date(projet.dateFin);
      // Add some padding
      ganttStart.setDate(ganttStart.getDate()-7);
      ganttEnd.setDate(ganttEnd.getDate()+7);
    }
  }

  // Get actions linked to this project
  if(results[1].status==='fulfilled'){
    actions=(results[1].value.data||[])
      .filter(function(r){return String(r[1])==='PROJ-'+String(projetId);})
      .map(function(r){
        return{
          id:r[0],auditId:r[1],description:r[7],
          phase:r[14]||'',livrable:r[15]||'',
          dateDebut:String(r[16]||'').split('T')[0]||String(r[3]||'').split('T')[0],
          delai:String(r[9]||'').split('T')[0],
          avancement:Number(r[10]||0),
          origin:r[6]
        };
      }).filter(function(a){return a.dateDebut&&a.delai;});
  }

  // Get independent tasks
  if(results[2].status==='fulfilled'){
    tasks=(results[2].value.data||[])
      .filter(function(r){return String(r[1])===String(projetId);})
      .map(function(r){
        return{id:r[0],projetId:r[1],nom:r[2],phase:r[3],livrable:r[4],debut:String(r[5]||'').split('T')[0],fin:String(r[6]||'').split('T')[0],resp:r[7],av:Number(r[8]||0),color:r[9]||'#8b5cf6'};
      });
  }

  if(!ganttStart){
    // Fallback: use today ± 3 months
    ganttStart=new Date();ganttStart.setMonth(ganttStart.getMonth()-1);
    ganttEnd=new Date();ganttEnd.setMonth(ganttEnd.getMonth()+5);
  }

  renderGantt();
  setTimeout(scrollToToday,300);
}

init();
</script>
